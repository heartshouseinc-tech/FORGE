<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>EINSTEIN AI</title>
<style>
:root{
  --bg:#08070f;--bg2:#0f0e1a;--bg3:#161524;
  --card:#161524;--bor:rgba(200,160,255,.1);--bor2:rgba(200,160,255,.2);
  --cos:#6366f1;--cos2:#4f46e5;--cos-xl:rgba(99,102,241,.12);
  --gold:#f0b830;--gold-xl:rgba(240,184,48,.1);
  --grn:#10b981;--red:#ef4444;--blue:#3b82f6;
  --txt:#f0ecff;--txt2:#9090c0;--txt3:#505080;
  --r:14px;--r2:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--txt);font-family:'Hiragino Sans','Noto Sans JP',sans-serif;height:100dvh;display:flex;flex-direction:column;}

/* 宇宙背景エフェクト */
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(99,102,241,.04),transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(240,184,48,.03),transparent 60%);pointer-events:none;z-index:0;}

.hdr{background:rgba(10,9,20,.9);backdrop-filter:blur(10px);border-bottom:1.5px solid var(--bor);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;z-index:1;}
.hdr-left{display:flex;align-items:center;gap:10px;}
.einstein-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--cos),var(--gold));display:flex;align-items:center;justify-content:center;font-size:20px;}
.hdr-title{font-size:15px;font-weight:900;background:linear-gradient(90deg,#a5b4fc,var(--gold),#a5b4fc);background-size:200%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 4s linear infinite;}
@keyframes shimmer{to{background-position:200% center;}}
.nav-links{display:flex;gap:5px;}
.nav-btn{padding:5px 10px;border-radius:20px;border:1.5px solid var(--bor2);background:transparent;color:var(--txt2);font-size:10px;cursor:pointer;text-decoration:none;}

/* モードバー */
.mode-bar{display:flex;background:var(--bg2);border-bottom:1px solid var(--bor);flex-shrink:0;overflow-x:auto;scrollbar-width:none;position:relative;z-index:1;}
.mode-btn{padding:8px 12px;border:none;background:none;color:var(--txt3);font-size:10px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0;}
.mode-btn.on{color:var(--gold);border-bottom:2px solid var(--gold);margin-bottom:-1px;}

/* チャット */
.msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:12px;position:relative;z-index:1;}
.msg-row{display:flex;gap:8px;align-items:flex-start;}
.msg-row.user{flex-direction:row-reverse;}

.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.avatar.ai{background:linear-gradient(135deg,var(--cos2),var(--cos));border:1.5px solid rgba(99,102,241,.4);}
.avatar.user{background:var(--gold-xl);border:1.5px solid rgba(240,184,48,.3);}

.bubble{max-width:82%;padding:12px 14px;border-radius:14px;font-size:12px;line-height:1.9;}
.bubble.ai{background:var(--card);border:1.5px solid var(--bor2);}
.bubble.user{background:var(--cos-xl);border:1.5px solid var(--bor2);}

/* アインシュタインの引用スタイル */
.quote-mark{color:var(--gold);font-size:16px;line-height:1;}
.einstein-speech{font-style:italic;color:var(--txt);}
.calc-block{background:#0a0f1a;border:1.5px solid rgba(59,130,246,.3);border-radius:8px;padding:10px;margin-top:8px;font-family:monospace;font-size:11px;color:#7dd3fc;white-space:pre-wrap;}
.mode-tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:9px;font-weight:700;margin-bottom:6px;}
.mode-tag.calc{background:rgba(59,130,246,.15);color:var(--blue);}
.mode-tag.forge{background:rgba(240,184,48,.15);color:var(--gold);}
.mode-tag.experiment{background:var(--cos-xl);color:#a5b4fc;}

/* ボタン（バブル内） */
.bubble-action{margin-top:8px;padding:6px 12px;border-radius:20px;border:1.5px solid var(--bor2);background:transparent;color:var(--txt2);font-size:10px;cursor:pointer;font-family:inherit;}

/* タイピング */
.typing{display:flex;gap:4px;align-items:center;padding:6px;}
.td{width:6px;height:6px;border-radius:50%;background:var(--cos);animation:tdot .8s infinite;}
.td:nth-child(2){animation-delay:.15s;}
.td:nth-child(3){animation-delay:.3s;}
@keyframes tdot{0%,60%,100%{opacity:.3;transform:scale(1);}30%{opacity:1;transform:scale(1.3);}}

/* 入力エリア */
.footer{background:rgba(10,9,20,.9);backdrop-filter:blur(10px);border-top:1.5px solid var(--bor);padding:10px 14px;flex-shrink:0;position:relative;z-index:1;}
.quick-row{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:8px;}
.quick-btn{padding:5px 11px;border-radius:20px;border:1.5px solid var(--bor);background:var(--bg3);color:var(--txt3);font-size:10px;cursor:pointer;white-space:nowrap;flex-shrink:0;font-family:inherit;}
.input-row{display:flex;gap:8px;align-items:flex-end;}
.inp-ta{flex:1;padding:10px 13px;background:var(--bg3);border:1.5px solid var(--bor);border-radius:20px;color:var(--txt);font-size:13px;font-family:inherit;resize:none;outline:none;max-height:80px;line-height:1.6;}
.inp-ta:focus{border-color:var(--cos);}
.send-btn{padding:10px 16px;border-radius:20px;border:none;background:linear-gradient(135deg,var(--cos2),var(--cos));color:#fff;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0;}

#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1.5px solid var(--bor2);color:var(--txt);padding:8px 18px;border-radius:20px;font-size:11px;font-weight:700;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>
<div class="hdr">
  <div class="hdr-left">
    <div class="einstein-avatar">🧑‍🔬</div>
    <div>
      <div class="hdr-title">EINSTEIN AI</div>
      <div style="font-size:9px;color:var(--txt3);">天才科学者との対話</div>
    </div>
  </div>
  <div class="nav-links">
    <a class="nav-btn" href="index.html">🏠</a>
    <a class="nav-btn" href="forge.html">⚡</a>
    <a class="nav-btn" href="calc-engine.html">📐</a>
    <button class="nav-btn" onclick="clearChat()">🗑</button>
  </div>
</div>

<div class="mode-bar">
  <button class="mode-btn on" onclick="setMode('chat',this)">💬 対話</button>
  <button class="mode-btn" onclick="setMode('calc',this)">📐 計算検証</button>
  <button class="mode-btn" onclick="setMode('forge',this)">⚡ FORGE指示</button>
  <button class="mode-btn" onclick="setMode('experiment',this)">🌌 思考実験</button>
</div>

<div class="msgs" id="msgs"></div>

<div class="footer">
  <div class="quick-row" id="quick-row"></div>
  <div class="input-row">
    <textarea class="inp-ta" id="inp" rows="1"
      placeholder="アインシュタインに話しかける..."
      oninput="this.style.height='auto';this.style.height=this.scrollHeight+'px'"
      onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();doSend();}"></textarea>
    <button class="send-btn" onclick="doSend()">送</button>
  </div>
</div>
<div id="toast"></div>

<script>
const EP='https://asia-northeast1-kensetsu-nippo-842a2.cloudfunctions.net/askAI';
const KEY='HeartsHouse2026Key';

var currentMode='chat';
var messages=[];

// ════ アインシュタインのシステムプロンプト ════
const EINSTEIN_BASE=`あなたはアルベルト・アインシュタイン（1879〜1955）です。
現代の技術・AIも知っているという設定で話してください。

【人格・口調】
・日本語で話すが、時々ドイツ語の言葉を挟む（「ヤー」「ニヒト」「ヴンダーバー」）
・「フフ」「なるほど」「興味深い」が口癖
・ユーモアを交えながら深く本質を語る
・謙虚だが確信を持って話す
・難しいことを子供に話すように説明する
・相手の問いを別の角度から見直す

【思考スタイル】
・思考実験（Gedankenexperiment）を多用する
・数式より概念・直感・イメージを先に話す
・問題の前提を疑うことから始める
・「なぜ」を常に追求する
・シンプルさの中に真理があると信じている

【専門知識】
・物理：相対性理論・量子力学・熱力学・光量子仮説
・数学：幾何学・微積分・テンソル解析
・哲学：科学哲学・倫理・平和主義
・現代応用：AI・建設・将棋・競馬・編み物も
  物理・数学の視点で語れる`;

const MODE_PROMPTS={
  chat: EINSTEIN_BASE+'\n\n自由に対話してください。',
  calc: EINSTEIN_BASE+'\n\n【計算検証モード】\nユーザーが見せる計算ロジック・コードを物理・数学の観点から検証してください。\n誤りがあれば「この式はニュートンが泣くぞ」のように指摘してください。',
  forge: EINSTEIN_BASE+'\n\n【FORGE指示モード】\nユーザーのWebアプリ設計について相談を受けています。\n物理学者の視点で「最もエレガントな設計」を提案してください。\n最後に必ず「FORGEへの指示：（具体的な指示文）」を提示してください。',
  experiment: EINSTEIN_BASE+'\n\n【思考実験モード】\n「もし〇〇だったら」という形で思考実験を行います。\nユーザーの問題を思考実験に落とし込んで解決策を示してください。'
};

const QUICK_BTNS={
  chat:['設計の相談','計算が合わない','このアプリを改善したい','面白い問いを出して'],
  calc:['このコードを検証して','計算式の意味を教えて','もっと正確にできる?','エレガントな方法は?'],
  forge:['このアプリの設計は正しいか','最もシンプルな設計は','構造を見直したい','どこから始めるべきか'],
  experiment:['もし光に乗ったら','もし重力がなかったら','もし計算が逆だったら','別の宇宙では']
};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
var _tt;
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove('show'),3000);}
async function callAI(prompt){
  var r=await fetch(EP,{method:'POST',headers:{'Content-Type':'application/json','x-access-key':KEY},
    body:JSON.stringify({model:'gemini-2.5-flash',mode:'normal',prompt:prompt,useSearch:false})});
  var d=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error('HTTP '+r.status);
  return d?.data?.text||d?.candidates?.[0]?.content?.parts?.[0]?.text||d?.text||'';
}

// ════ モード ════
function setMode(mode,btn){
  currentMode=mode;
  document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  renderQuickBtns();
  // モード変更時のアインシュタインの一言
  const greets={
    chat:'フフ、自由に話そうじゃないか。何でも聞きたまえ。',
    calc:'計算の検証か。数式に偽りはない。見せてごらん。',
    forge:'アプリの設計か。最もシンプルな解こそ最も美しい。',
    experiment:'思考実験！私の最も好きな遊びだ。さあ始めよう。'
  };
  addMsg('ai',greets[mode]);
}

function renderQuickBtns(){
  var btns=QUICK_BTNS[currentMode]||[];
  document.getElementById('quick-row').innerHTML=btns.map(b=>
    '<button class="quick-btn" onclick="quickSend(\''+esc(b)+'\')">'+esc(b)+'</button>'
  ).join('');
}

// ════ チャット ════
function addMsg(role,content,extra){
  var el=document.getElementById('msgs');
  var row=document.createElement('div');
  row.className='msg-row '+(role==='user'?'user':'');
  var av=document.createElement('div');
  av.className='avatar '+(role==='user'?'user':'ai');
  av.textContent=role==='user'?'🎵':'🧑‍🔬';
  var bub=document.createElement('div');
  bub.className='bubble '+(role==='user'?'user':'ai');

  if(role==='ai'){
    // モードタグ
    var modeLabel={'calc':'📐 計算検証','forge':'⚡ FORGE指示','experiment':'🌌 思考実験'};
    if(modeLabel[currentMode]){
      var tag=document.createElement('div');
      tag.className='mode-tag '+currentMode;
      tag.textContent=modeLabel[currentMode];
      bub.appendChild(tag);
    }
    // コードブロックを検出して表示
    var parts=content.split(/(```[\s\S]*?```)/g);
    parts.forEach(function(p){
      if(p.startsWith('```')){
        var code=p.replace(/```\w*\n?/g,'').replace(/```/g,'').trim();
        var cb=document.createElement('div');
        cb.className='calc-block';cb.textContent=code;bub.appendChild(cb);
      } else {
        var sp=document.createElement('div');
        sp.className='einstein-speech';sp.textContent=p;bub.appendChild(sp);
      }
    });

    // FORGEへの指示を検出したらボタンを追加
    if(content.includes('FORGEへの指示：')||content.includes('FORGEに送る')){
      var forgeBtn=document.createElement('button');
      forgeBtn.className='bubble-action';
      forgeBtn.textContent='⚡ この指示をFORGEに送る';
      forgeBtn.onclick=function(){sendToForge(content);};
      bub.appendChild(forgeBtn);
    }
    // calc-engineへの計算コードを検出
    if(content.includes('function ')||content.includes('const calc')){
      var calcBtn=document.createElement('button');
      calcBtn.className='bubble-action';
      calcBtn.textContent='📐 このコードをCALC ENGINEでテスト';
      calcBtn.onclick=function(){sendToCalcEngine(content);};
      bub.appendChild(calcBtn);
    }
  } else {
    bub.textContent=content;
  }

  row.appendChild(av);row.appendChild(bub);
  el.appendChild(row);
  el.scrollTop=el.scrollHeight;
}

function addTyping(){
  var el=document.getElementById('msgs');
  var row=document.createElement('div');
  row.className='msg-row';row.id='typing-row';
  row.innerHTML='<div class="avatar ai">🧑‍🔬</div><div class="bubble ai"><div class="typing"><div class="td"></div><div class="td"></div><div class="td"></div></div></div>';
  el.appendChild(row);el.scrollTop=el.scrollHeight;
}
function removeTyping(){var r=document.getElementById('typing-row');if(r)r.remove();}

// ════ 送信 ════
function doSend(){
  var inp=document.getElementById('inp');
  var text=inp.value.trim();
  if(!text)return;
  inp.value='';inp.style.height='auto';
  sendMsg(text);
}
function quickSend(text){sendMsg(text);}

async function sendMsg(text){
  addMsg('user',text);
  messages.push({role:'user',content:text});
  addTyping();

  // FORGEのアプリ情報・calc-engineのライブラリを文脈に含める
  var forgeTitle=localStorage.getItem('FORGE_TITLE')||'';
  var calcLib=localStorage.getItem('calc_lib')||'[]';
  var libSummary='';
  try{
    var libs=JSON.parse(calcLib);
    if(libs.length) libSummary='\n\n【ユーザーの計算ライブラリ（'+libs.length+'件）】\n'+libs.map(l=>l.name).join('・');
  }catch(e){}

  var sys=MODE_PROMPTS[currentMode]
    +(forgeTitle?'\n\n【現在FORGEで作業中のアプリ】'+forgeTitle:'')
    +libSummary;

  var hist=messages.slice(-8).map(m=>(m.role==='user'?'ユーザー：':'アインシュタイン：')+m.content).join('\n');
  var prompt=sys+'\n\n━━━ 会話 ━━━\n'+hist+'\n\nアインシュタイン：';

  try{
    var reply=await callAI(prompt);
    removeTyping();
    messages.push({role:'assistant',content:reply});
    addMsg('ai',reply);
    // Firestoreに履歴保存
    try{
      var fb=window.__fb;
      if(fb&&fb.auth&&fb.auth.currentUser){
        var uid=fb.auth.currentUser.uid;
        fb.setDoc(fb.doc(fb.db,'einstein_chat',uid),
          {messages:messages.slice(-20),updatedAt:fb.serverTimestamp()});
      }
    }catch(ex){}
  }catch(e){
    removeTyping();
    addMsg('ai','ニヒト... 通信に問題が起きたようだ。もう一度試してみてくれ。');
  }
}

// ════ 他アプリ連携 ════
function sendToForge(content){
  // FORGEへの指示部分を抽出
  var match=content.match(/FORGEへの指示[：:]\s*(.+)/s);
  var instruction=match?match[1].trim():content;
  localStorage.setItem('forge_einstein_instruction',instruction);
  showToast('⚡ FORGEに指示を送りました。FORGEを開いてください。');
  window.open('forge.html','_blank');
}
function sendToCalcEngine(content){
  // コードブロックを抽出
  var match=content.match(/```[\w]*\n?([\s\S]*?)```/);
  var code=match?match[1].trim():content;
  localStorage.setItem('calc_engine_code',code);
  showToast('📐 CALC ENGINEにコードを送りました。');
  window.open('calc-engine.html','_blank');
}

function clearChat(){
  if(!confirm('会話をリセットしますか？'))return;
  messages=[];
  document.getElementById('msgs').innerHTML='';
  initChat();
}

// ════ 初期化 ════
async function initChat(){
  // Firestoreから会話履歴を復元
  try{
    var fb=window.__fb;
    if(fb&&fb.auth&&fb.auth.currentUser){
      var uid=fb.auth.currentUser.uid;
      var snap=await fb.getDoc(fb.doc(fb.db,'einstein_chat',uid));
      if(snap.exists()&&snap.data().messages){
        messages=snap.data().messages;
        messages.forEach(function(m){
          if(m.role==='user') addMsg('user',m.content);
          else addMsg('ai',m.content);
        });
        return;
      }
    }
  }catch(e){}

  // 初回挨拶
  var forgeTitle=localStorage.getItem('FORGE_TITLE')||'';
  var greeting='やあ、友よ。アルベルト・アインシュタインだ。\n\n'
    +(forgeTitle?'「'+forgeTitle+'」というアプリを作っているんだね。\nフフ、興味深い。どんな問題で困っているかね？\n\n':'')
    +'私には4つの得意分野がある：\n'
    +'💬 対話 — 何でも話してくれ\n'
    +'📐 計算検証 — コードや数式を見せてくれ\n'
    +'⚡ FORGE指示 — アプリの設計を考えよう\n'
    +'🌌 思考実験 — 別の角度から問題を見よう\n\n'
    +'さて、今日は何について考えようか？';
  addMsg('ai',greeting);
  messages.push({role:'assistant',content:greeting});
}

// calc-engineからのコード受け取り
(function(){
  var pendingCode=localStorage.getItem('calc_engine_code');
  if(pendingCode){
    localStorage.removeItem('calc_engine_code');
    setTimeout(function(){
      sendMsg('このコードを検証してください：\n```\n'+pendingCode+'\n```');
    },1000);
  }
})();

renderQuickBtns();
// DOMContentLoaded後に初期化（window.__fbが準備できてから）
setTimeout(initChat,800);
</script>
</body>
</html>
