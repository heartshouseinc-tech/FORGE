<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>CALC ENGINE</title>
<style>
:root{--bg:#080c10;--bg2:#0e1318;--bg3:#151c24;--card:#151c24;--bor:rgba(80,180,255,.1);--bor2:rgba(80,180,255,.22);--blue:#3b82f6;--blue2:#1d4ed8;--blue-xl:rgba(59,130,246,.12);--grn:#10b981;--grn-xl:rgba(16,185,129,.12);--gold:#f0b830;--red:#ef4444;--txt:#e8f0f8;--txt2:#7090b0;--txt3:#405060;--r:12px;--r2:8px;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--txt);font-family:'Hiragino Sans','Noto Sans JP',sans-serif;min-height:100vh;}
.hdr{background:linear-gradient(135deg,#050a14,#0a1020);border-bottom:1.5px solid var(--bor);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-size:16px;font-weight:900;background:linear-gradient(90deg,var(--blue),var(--grn));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.nav-links{display:flex;gap:5px;}
.nav-btn{padding:5px 10px;border-radius:20px;border:1.5px solid var(--bor2);background:transparent;color:var(--txt2);font-size:10px;cursor:pointer;text-decoration:none;}
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--bor);}
.tab{flex:1;padding:10px 3px;border:none;background:none;color:var(--txt3);font-size:10px;font-weight:700;cursor:pointer;font-family:inherit;}
.tab.on{color:var(--blue);border-bottom:2px solid var(--blue);margin-bottom:-1px;}
.main{padding:14px;max-width:600px;margin:0 auto;}
.card{background:var(--card);border:1.5px solid var(--bor);border-radius:var(--r);padding:14px;margin-bottom:12px;}
.card-lbl{font-size:10px;font-weight:700;color:var(--txt3);letter-spacing:.5px;margin-bottom:8px;}
.inp{width:100%;padding:10px 12px;background:var(--bg3);border:1.5px solid var(--bor);border-radius:var(--r2);color:var(--txt);font-size:12px;font-family:inherit;outline:none;margin-bottom:8px;}
.ta{width:100%;padding:10px 12px;background:var(--bg3);border:1.5px solid var(--bor);border-radius:var(--r2);color:var(--txt);font-size:11px;font-family:monospace;resize:none;outline:none;line-height:1.7;}
.sel{width:100%;padding:10px 12px;background:var(--bg3);border:1.5px solid var(--bor);border-radius:var(--r2);color:var(--txt);font-size:12px;font-family:inherit;outline:none;margin-bottom:8px;}
.btn{padding:11px 16px;border-radius:var(--r2);border:none;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.15s;}
.btn:active{transform:scale(.97);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-blue{background:linear-gradient(135deg,var(--blue2),var(--blue));color:#fff;}
.btn-grn{background:linear-gradient(135deg,#059669,var(--grn));color:#fff;}
.btn-gold{background:linear-gradient(135deg,#d4960a,var(--gold));color:#000;}
.btn-ghost{background:var(--bg3);border:1.5px solid var(--bor2);color:var(--txt2);}
.btn-full{width:100%;}
.btn-row{display:flex;gap:8px;}
.domain-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:10px;}
.domain-chip{background:var(--bg3);border:1.5px solid var(--bor);border-radius:var(--r2);padding:8px;text-align:center;cursor:pointer;transition:.15s;}
.domain-chip.on{border-color:var(--blue);background:var(--blue-xl);}
.d-ico{font-size:18px;}
.d-nm{font-size:9px;color:var(--txt2);margin-top:3px;font-weight:700;}
.code-view{background:#0a0e14;border:1.5px solid var(--bor);border-radius:var(--r2);padding:12px;font-size:11px;font-family:monospace;color:#7dd3fc;line-height:1.8;white-space:pre-wrap;word-break:break-all;max-height:300px;overflow-y:auto;margin-bottom:8px;}
.test-item{padding:8px 10px;border-radius:var(--r2);margin-bottom:4px;font-size:11px;font-family:monospace;}
.test-ok{background:var(--grn-xl);border:1px solid rgba(16,185,129,.3);color:var(--grn);}
.test-ng{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.3);color:var(--red);}
.lib-item{background:var(--bg3);border:1.5px solid var(--bor);border-radius:var(--r2);padding:12px;margin-bottom:8px;}
.lib-name{font-size:13px;font-weight:700;color:var(--txt);margin-bottom:3px;}
.lib-meta{font-size:10px;color:var(--txt3);margin-bottom:6px;}
.lib-actions{display:flex;gap:5px;}
.precision-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.loading-wrap{text-align:center;padding:24px;}
.loading-ico{font-size:36px;animation:spin 1.5s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-txt{font-size:11px;color:var(--txt3);margin-top:8px;}
#toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--bg2);border:1.5px solid var(--bor2);color:var(--txt);padding:8px 18px;border-radius:20px;font-size:11px;font-weight:700;z-index:9999;pointer-events:none;opacity:0;transition:opacity .3s;white-space:nowrap;}
#toast.show{opacity:1;}
</style>
</head>
<body>
<div class="hdr">
  <div>
    <div class="hdr-title">CALC ENGINE</div>
    <div style="font-size:9px;color:var(--txt3);">計算ロジック生成・テスト・ライブラリ</div>
  </div>
  <div class="nav-links">
    <a class="nav-btn" href="index.html">Home</a>
    <a class="nav-btn" href="forge.html">FORGE</a>
    <a class="nav-btn" href="einstein.html">EINSTEIN</a>
  </div>
</div>
<div class="tabs">
  <button class="tab on" onclick="goTab('gen',this)">生成</button>
  <button class="tab" onclick="goTab('test',this)">テスト</button>
  <button class="tab" onclick="goTab('lib',this)">ライブラリ</button>
  <button class="tab" onclick="goTab('forge',this)">FORGE連携</button>
</div>
<div class="main">
  <div id="pg-gen">
    <div class="card">
      <div class="card-lbl">ドメイン</div>
      <div class="domain-grid" id="domain-grid"></div>
      <div class="card-lbl">計算内容</div>
      <textarea class="ta" id="gen-desc" rows="3" placeholder="例：廻り階段の各段の角度と展開長さを計算"></textarea>
      <div class="precision-row" style="margin-top:8px;">
        <div><div style="font-size:10px;color:var(--txt3);margin-bottom:4px;">端数処理</div>
          <select class="sel" id="gen-rounding" style="margin:0;"><option value="none">そのまま</option><option value="round">四捨五入</option><option value="ceil">切り上げ</option><option value="floor">切り捨て</option></select></div>
        <div><div style="font-size:10px;color:var(--txt3);margin-bottom:4px;">単位</div>
          <select class="sel" id="gen-unit" style="margin:0;"><option>mm</option><option>cm</option><option>m</option><option>度</option><option>円</option><option>無単位</option></select></div>
      </div>
    </div>
    <button class="btn btn-blue btn-full" onclick="generateLogic()" id="gen-btn">計算ロジックを生成</button>
    <div id="gen-loading" style="display:none;"><div class="loading-wrap"><div class="loading-ico">📐</div><div class="loading-txt">生成中...</div></div></div>
    <div id="gen-result" style="display:none;">
      <div class="card">
        <div class="card-lbl" id="gen-func-name">関数名</div>
        <div class="code-view" id="gen-code"></div>
        <div class="btn-row">
          <button class="btn btn-ghost" onclick="copyCode()" style="flex:1;font-size:11px;">コピー</button>
          <button class="btn btn-grn" onclick="goTestWithCode()" style="flex:1;font-size:11px;">テスト</button>
          <button class="btn btn-gold" onclick="saveToLib()" style="flex:1;font-size:11px;">保存</button>
        </div>
      </div>
      <div class="card" id="gen-explanation" style="font-size:11px;color:var(--txt2);line-height:1.8;"></div>
    </div>
  </div>
  <div id="pg-test" style="display:none;">
    <div class="card">
      <div class="card-lbl">テストするコード</div>
      <textarea class="ta" id="test-code" rows="6" placeholder="JavaScript関数を貼り付け..."></textarea>
      <div class="card-lbl" style="margin-top:8px;">テストケース（JSON配列）</div>
      <textarea class="ta" id="test-cases" rows="3" placeholder='[{"input":[4,250],"expected":22.5,"desc":"4段廻り"}]'></textarea>
    </div>
    <div class="btn-row">
      <button class="btn btn-blue" onclick="runTests()" style="flex:1;">テスト実行</button>
      <button class="btn btn-ghost" onclick="genTestCases()" style="flex:1;">AIでテスト生成</button>
    </div>
    <div id="test-results" style="margin-top:10px;"></div>
    <div id="test-fix-area" style="display:none;margin-top:8px;">
      <button class="btn btn-grn btn-full" onclick="autoFixCode()">AIが自動修正</button>
    </div>
  </div>
  <div id="pg-lib" style="display:none;">
    <div class="btn-row" style="margin-bottom:10px;">
      <select class="sel" id="lib-filter" style="flex:1;margin:0;" onchange="loadLib()">
        <option value="">すべて</option>
        <option value="建設">建設・大工</option>
        <option value="将棋">将棋</option>
        <option value="競馬">競馬</option>
        <option value="税務">税務</option>
        <option value="編み物">編み物</option>
        <option value="汎用">汎用数学</option>
      </select>
      <button class="btn btn-ghost" onclick="loadLib()" style="padding:10px 12px;">更新</button>
    </div>
    <div id="lib-list"></div>
  </div>
  <div id="pg-forge" style="display:none;">
    <div class="card">
      <div class="card-lbl">FORGEのアプリに計算ロジックを挿入</div>
      <div id="forge-app-info" style="font-size:11px;color:var(--txt2);margin-bottom:10px;"></div>
      <div class="card-lbl">挿入するコード</div>
      <textarea class="ta" id="forge-insert-code" rows="5" placeholder="挿入する関数コードを貼り付け..."></textarea>
      <div class="card-lbl" style="margin-top:8px;">挿入の指示（任意）</div>
      <textarea class="ta" id="forge-insert-desc" rows="2" placeholder="例：計算ボタンのonclickでこの関数を呼ぶ"></textarea>
    </div>
    <button class="btn btn-blue btn-full" onclick="insertToForge()" id="forge-btn">FORGEのアプリに挿入</button>
    <div id="forge-loading" style="display:none;"><div class="loading-wrap"><div class="loading-ico">⚡</div><div class="loading-txt">挿入中...</div></div></div>
    <div id="forge-done" style="display:none;" class="card">
      <div style="color:var(--grn);font-size:12px;font-weight:700;margin-bottom:6px;">挿入完了</div>
      <a href="forge.html" class="btn btn-ghost btn-full" style="display:block;text-align:center;text-decoration:none;margin-top:6px;">FORGEで確認</a>
    </div>
  </div>
</div>
<div id="toast"></div>
<script>
var EP='https://asia-northeast1-kensetsu-nippo-842a2.cloudfunctions.net/askAI';
var KEY='HeartsHouse2026Key';
var DOMAINS=[
  {id:'kensetsu',ico:'[建]',nm:'建設・大工'},
  {id:'shogi',ico:'[将]',nm:'将棋'},
  {id:'keiba',ico:'[馬]',nm:'競馬'},
  {id:'zeimu',ico:'[税]',nm:'税務'},
  {id:'amimono',ico:'[編]',nm:'編み物'},
  {id:'hanyou',ico:'[汎]',nm:'汎用数学'}
];
var selectedDomain='kensetsu';
var currentCode='';
var currentFuncName='calc';
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
var _tt;
function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(_tt);_tt=setTimeout(function(){t.classList.remove('show');},3000);}
async function callAI(prompt,schema){
  var body={model:'gemini-2.5-flash',mode:'normal',prompt:prompt,useSearch:false,useCache:true};
  if(schema) body.responseSchema=schema;
  var r=await fetch(EP,{method:'POST',headers:{'Content-Type':'application/json','x-access-key':KEY},body:JSON.stringify(body)});
  var d=await r.json().catch(function(){return{};});
  if(!r.ok) throw new Error('HTTP '+r.status);
  return (d&&d.data&&d.data.text)?d.data.text:((d&&d.candidates&&d.candidates[0]&&d.candidates[0].content&&d.candidates[0].content.parts&&d.candidates[0].content.parts[0]&&d.candidates[0].content.parts[0].text)?d.candidates[0].content.parts[0].text:((d&&d.text)?d.text:''));
}
function goTab(name,btn){
  ['gen','test','lib','forge'].forEach(function(n){document.getElementById('pg-'+n).style.display=n===name?'block':'none';});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  if(btn) btn.classList.add('on');
  if(name==='lib') loadLib();
  if(name==='forge') initForgeTab();
}
function renderDomains(){
  var el=document.getElementById('domain-grid');
  if(!el) return;
  el.innerHTML=DOMAINS.map(function(d){return '<div class="domain-chip'+(d.id===selectedDomain?' on':'')+'" onclick="selectDomain(\''+d.id+'\')" id="dc-'+d.id+'"><div class="d-ico">'+d.ico+'</div><div class="d-nm">'+esc(d.nm)+'</div></div>';}).join('');
}
function selectDomain(id){
  selectedDomain=id;
  document.querySelectorAll('.domain-chip').forEach(function(el){el.classList.remove('on');});
  var el=document.getElementById('dc-'+id);
  if(el) el.classList.add('on');
}
async function generateLogic(){
  var desc=document.getElementById('gen-desc').value.trim();
  if(!desc){showToast('計算内容を入力してください');return;}
  var rounding=document.getElementById('gen-rounding').value;
  var unit=document.getElementById('gen-unit').value;
  var btn=document.getElementById('gen-btn');btn.disabled=true;
  document.getElementById('gen-loading').style.display='block';
  document.getElementById('gen-result').style.display='none';
  var dn=(DOMAINS.find(function(d){return d.id===selectedDomain;})||{nm:selectedDomain}).nm;
  var schema={type:'object',properties:{function_name:{type:'string'},code:{type:'string'},test_cases:{type:'string'},explanation:{type:'string'},caveats:{type:'string'}},required:['function_name','code','test_cases','explanation']};
  var prompt='あなたはJavaScriptの数値計算専門エンジニアです。ドメイン:'+dn+' 計算内容:'+desc+' 端数:'+rounding+' 単位:'+unit+' 以下の要件でJS関数を生成: 1.JSDocコメント付き 2.型・単位をコメント明記 3.エッジケース処理 4.マジックナンバーは定数 5.推測・近似禁止 6.console.assertのテストケース3件以上 7.業務精度';
  try{
    var raw=await callAI(prompt,schema);
    var result=JSON.parse(raw.replace(/```json|```/g,'').trim());
    currentCode=result.code||'';currentFuncName=result.function_name||'calc';
    document.getElementById('gen-func-name').textContent=currentFuncName;
    document.getElementById('gen-code').textContent=currentCode+(result.test_cases?'\n\n// test\n'+result.test_cases:'');
    document.getElementById('gen-explanation').innerHTML='<div class="card-lbl">解説</div>'+esc(result.explanation||'')+(result.caveats?'<div style="margin-top:8px;font-size:10px;color:var(--gold);">注意:'+esc(result.caveats)+'</div>':'');
    document.getElementById('gen-loading').style.display='none';
    document.getElementById('gen-result').style.display='block';
    document.getElementById('test-code').value=currentCode;
    if(result.test_cases) document.getElementById('test-cases').value=result.test_cases;
    showToast('生成完了');
  }catch(e){document.getElementById('gen-loading').style.display='none';showToast('エラー:'+e.message);}
  btn.disabled=false;
}
function copyCode(){if(!currentCode){showToast('コードがありません');return;}if(navigator.clipboard) navigator.clipboard.writeText(currentCode).then(function(){showToast('コピーしました');});}
function goTestWithCode(){goTab('test',document.querySelectorAll('.tab')[1]);}
function runTests(){
  var code=document.getElementById('test-code').value.trim();
  var casesStr=document.getElementById('test-cases').value.trim();
  if(!code){showToast('コードを入力してください');return;}
  var results=[];
  try{
    var fn=new Function(code+';return typeof '+currentFuncName+'!=="undefined"?'+currentFuncName+':null;');
    var calcFn=fn();
    if(casesStr&&calcFn){
      var cases=JSON.parse(casesStr);
      cases.forEach(function(c){
        try{
          var actual=calcFn.apply(null,c.input||[]);
          var pass=JSON.stringify(actual)===JSON.stringify(c.expected)||
            (typeof c.expected==='number'&&typeof actual==='number'&&Math.abs(actual-c.expected)<0.01);
          results.push({pass:pass,desc:c.desc||'test',actual:actual,expected:c.expected});
        }catch(e2){results.push({pass:false,desc:c.desc||'test',error:e2.message});}
      });
    }else{results.push({pass:true,desc:'構文チェック'});}
  }catch(e){results.push({pass:false,desc:'実行エラー',error:e.message});}
  var hasFail=results.some(function(r){return !r.pass;});
  document.getElementById('test-results').innerHTML=results.map(function(r){return '<div class="test-item '+(r.pass?'test-ok':'test-ng')+'">'+(r.pass?'[OK]':'[NG]')+' '+esc(r.desc||'')+(r.error?'<br>'+esc(r.error):'')+(r.actual!==undefined?'<br>実際:'+esc(JSON.stringify(r.actual)):'')+'</div>';}).join('');
  document.getElementById('test-fix-area').style.display=hasFail?'block':'none';
  showToast(hasFail?'失敗あり':'全テスト通過');
}
async function genTestCases(){
  var code=document.getElementById('test-code').value.trim();
  if(!code){showToast('コードを入力してください');return;}
  try{
    var raw=await callAI('以下のJS関数のテストケースをJSON配列で3件生成。形式:[{"input":[引数],"expected":期待値,"desc":"説明"}] JSONのみ出力。\n'+code);
    document.getElementById('test-cases').value=raw.replace(/```json|```/g,'').trim();
    showToast('テストケース生成完了');
  }catch(e){showToast('エラー:'+e.message);}
}
async function autoFixCode(){
  var code=document.getElementById('test-code').value.trim();
  var cases=document.getElementById('test-cases').value.trim();
  if(!code) return;
  try{
    var raw=await callAI('以下のJS関数がテストを通過しない。修正したコードのみ出力。\n関数:\n'+code+'\nテスト:\n'+cases);
    document.getElementById('test-code').value=raw.replace(/```javascript|```js|```/g,'').trim();
    currentCode=document.getElementById('test-code').value;
    runTests();showToast('修正完了・再テスト中');
  }catch(e){showToast('エラー:'+e.message);}
}
async function saveToLib(){
  if(!currentCode){showToast('コードがありません');return;}
  var name=prompt('ロジック名:',currentFuncName)||currentFuncName;
  var dn=(DOMAINS.find(function(d){return d.id===selectedDomain;})||{nm:selectedDomain}).nm;
  try{
    var fb=window.__fb;
    if(fb&&fb.auth&&fb.auth.currentUser){
      await fb.setDoc(fb.doc(fb.db,'calc_library',fb.auth.currentUser.uid+'_'+Date.now()),{name:name,domain:dn,code:currentCode,userId:fb.auth.currentUser.uid,createdAt:fb.serverTimestamp()});
      showToast('Firestoreに保存:'+name);return;
    }
  }catch(e){}
  var libs=[];try{libs=JSON.parse(localStorage.getItem('calc_lib')||'[]');}catch(e){}
  libs.push({id:'l_'+Date.now(),name:name,domain:dn,code:currentCode,createdAt:new Date().toLocaleString('ja-JP')});
  localStorage.setItem('calc_lib',JSON.stringify(libs));
  showToast('ローカルに保存:'+name);
}
async function loadLib(){
  var filter=document.getElementById('lib-filter').value;
  var items=[];
  try{var fb=window.__fb;if(fb&&fb.auth&&fb.auth.currentUser){var uid=fb.auth.currentUser.uid;var snap=await fb.getDocs(fb.collection(fb.db,'calc_library'));snap.forEach(function(d){var data=d.data();if(data.userId===uid&&(!filter||data.domain===filter)) items.push({id:d.id,name:data.name,domain:data.domain,code:data.code});});}}catch(e){}
  try{var local=JSON.parse(localStorage.getItem('calc_lib')||'[]');local.filter(function(l){return !filter||l.domain===filter;}).forEach(function(l){items.push(l);});}catch(e){}
  if(!items.length){document.getElementById('lib-list').innerHTML='<div style="text-align:center;padding:20px;color:var(--txt3);">保存されたロジックがありません</div>';return;}
  document.getElementById('lib-list').innerHTML=items.map(function(item){return '<div class="lib-item"><div class="lib-name">'+esc(item.name||'')+'</div><div class="lib-meta">'+esc(item.domain||'')+'</div><div class="lib-actions"><button class="btn btn-ghost" onclick="useLibItem(\''+esc(String(item.id))+'\')" style="font-size:10px;padding:5px 10px;">使う</button><button class="btn btn-blue" onclick="sendLibToForge(\''+esc(String(item.id))+'\')" style="font-size:10px;padding:5px 10px;">FORGE</button><button class="btn btn-ghost" onclick="deleteLibItem(\''+esc(String(item.id))+'\')" style="font-size:10px;padding:5px 10px;color:var(--red);">削除</button></div></div>';}).join('');
}
function useLibItem(id){var items=[];try{items=JSON.parse(localStorage.getItem('calc_lib')||'[]');}catch(e){}var item=items.find(function(i){return String(i.id)===String(id);});if(item){currentCode=item.code;currentFuncName=item.name;document.getElementById('test-code').value=item.code;goTab('test',document.querySelectorAll('.tab')[1]);showToast(item.name+'をセット');}}
function sendLibToForge(id){var items=[];try{items=JSON.parse(localStorage.getItem('calc_lib')||'[]');}catch(e){}var item=items.find(function(i){return String(i.id)===String(id);});if(item){document.getElementById('forge-insert-code').value=item.code;goTab('forge',document.querySelectorAll('.tab')[3]);showToast('FORGEタブにセット');}}
async function deleteLibItem(id){if(!confirm('削除しますか？')) return;var items=[];try{items=JSON.parse(localStorage.getItem('calc_lib')||'[]');}catch(e){}items=items.filter(function(i){return String(i.id)!==String(id);});localStorage.setItem('calc_lib',JSON.stringify(items));try{var fb=window.__fb;if(fb) await fb.deleteDoc(fb.doc(fb.db,'calc_library',id));}catch(e){}loadLib();showToast('削除しました');}
function initForgeTab(){var title=localStorage.getItem('FORGE_TITLE')||'未生成';var html=localStorage.getItem('FORGE_CURRENT_HTML')||'';document.getElementById('forge-app-info').textContent='対象:'+title+(html?' ('+html.length+'文字)':'');}
async function insertToForge(){
  var html=localStorage.getItem('FORGE_CURRENT_HTML')||'';
  var code=document.getElementById('forge-insert-code').value.trim();
  var desc=document.getElementById('forge-insert-desc').value.trim();
  if(!html){showToast('FORGEでアプリを生成してください');return;}
  if(!code){showToast('挿入するコードを入力してください');return;}
  var btn=document.getElementById('forge-btn');btn.disabled=true;
  document.getElementById('forge-loading').style.display='block';
  document.getElementById('forge-done').style.display='none';
  var tag='/sc'+'ript';
  var prompt='WebアプリHTMLに計算ロジック関数を挿入してください。挿入コード:\n'+code+'\n'+(desc?'指示:'+desc+'\n':'')+'ルール:既存コードを変更せずscriptタグ内に挿入。\n元のHTML:\n'+html.slice(0,12000)+'\n\n完全なHTMLを出力。マークダウン禁止。';
  try{
    var result=await callAI(prompt);
    var htmlMatch=result.match(/<!DOCTYPE[\s\S]*<\/html>/i)||result.match(/<html[\s\S]*<\/html>/i);
    var newHTML=htmlMatch?htmlMatch[0]:result;
    localStorage.setItem('FORGE_CURRENT_HTML',newHTML);
    try{var fb=window.__fb;if(fb&&fb.auth&&fb.auth.currentUser){fb.setDoc(fb.doc(fb.db,'forge_sessions',fb.auth.currentUser.uid),{html:newHTML,title:localStorage.getItem('FORGE_TITLE')||'',updatedAt:fb.serverTimestamp()});}}catch(ex){}
    document.getElementById('forge-loading').style.display='none';
    document.getElementById('forge-done').style.display='block';
    showToast('FORGEのアプリに挿入完了');
  }catch(e){document.getElementById('forge-loading').style.display='none';showToast('エラー:'+e.message);}
  btn.disabled=false;
}
renderDomains();
</script>
